name: Build and Deploy Frontend to S3

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Kolla ut repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      # 3. Installera frontend dependencies
      - name: Install dependencies
        run: |
          cd frontend
          npm install

      # 4. Bygg frontend
      - name: Build project
        run: |
          cd frontend 
          npm run build

      # 5. Konfigurera AWS credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      # 6. Synka dist till S3
      - name: Deploy to S3
        run: |
          cd frontend
          aws s3 sync dist s3://myappliesbucket --delete
